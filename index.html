<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LZC × LFR · 521</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Ma+Shan+Zheng&family=Nunito:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1016;
  --paper: #faf5ee;
  --rose: #b5434f;
  --blush: #e8c4c8;
  --gold: #c9a150;
  --mist: #9b8890;
  --film: rgba(26,16,22,0.06);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  cursor: default;
}

/* ─── Grain overlay ─── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999; opacity:.5;
}

/* ─── HERO ─── */
#hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#hero-bg {
  position: absolute; inset:0;
  background: radial-gradient(ellipse at 60% 40%, #f0dde0 0%, #faf5ee 65%);
}
.hero-line {
  position: absolute;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--blush), transparent);
  opacity: .6;
}
.hero-line:nth-child(1) { left:18%; height:60%; top:20%; }
.hero-line:nth-child(2) { right:22%; height:40%; top:30%; }
.hero-date {
  position: relative;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(.75rem,2vw,.9rem);
  letter-spacing: 8px;
  color: var(--mist);
  margin-bottom: 28px;
}
.hero-title {
  position: relative;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(5rem,18vw,14rem);
  font-weight: 300;
  line-height: .9;
  color: var(--ink);
  text-align: center;
  letter-spacing: -2px;
}
.hero-title em {
  color: var(--rose);
  font-style: italic;
}
.hero-sub {
  position: relative;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(1rem,2.5vw,1.3rem);
  color: var(--mist);
  margin-top: 30px;
  letter-spacing: 4px;
}
.scroll-hint {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--mist);
  font-size: .72rem;
  letter-spacing: 3px;
  animation: bounce 2.2s ease-in-out infinite;
}
.scroll-hint::after {
  content: '';
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, var(--mist), transparent);
}
@keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }

/* ─── UPLOAD STAGE ─── */
#upload-stage {
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
}
#upload-stage h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem,5vw,3rem);
  font-style: italic;
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 10px;
  text-align: center;
}
#upload-stage p {
  color: var(--mist);
  font-size: .88rem;
  margin-bottom: 36px;
  text-align: center;
  letter-spacing: 1px;
}
#drop-zone {
  width: min(500px, 90vw);
  border: 1.5px solid var(--blush);
  border-radius: 4px;
  padding: 56px 30px;
  text-align: center;
  cursor: pointer;
  transition: all .3s;
  background: rgba(229,196,200,.08);
  position: relative;
  overflow: hidden;
}
#drop-zone::before {
  content:'';
  position:absolute; inset:-1px;
  border: 1.5px dashed var(--blush);
  border-radius: 4px;
  animation: borderPulse 3s linear infinite;
}
@keyframes borderPulse {
  0%,100% { opacity:.4; }
  50% { opacity:1; }
}
#drop-zone:hover, #drop-zone.drag { background: rgba(229,196,200,.22); }
.drop-icon { font-size: 2.4rem; margin-bottom: 16px; display:block; }
#drop-zone strong { color: var(--rose); font-weight:400; }
#drop-zone small { display:block; color:var(--mist); margin-top:8px; font-size:.78rem; }
#file-input { display:none; }

/* ─── STORY SCROLL ─── */
#story {
  padding: 0 0 140px;
}

/* Chapter marker */
.chapter-mark {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 80px 8vw 40px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity .8s, transform .8s;
}
.chapter-mark.visible { opacity:1; transform:translateY(0); }
.chapter-mark .ch-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 4rem;
  font-style: italic;
  color: var(--blush);
  line-height:1;
  flex-shrink:0;
}
.chapter-mark .ch-line {
  flex:1; height:1px;
  background: linear-gradient(to right, var(--blush), transparent);
}

/* ── Layout types ── */
/* Full bleed */
.layout-full {
  width: 100%;
  margin-bottom: 10px;
  position: relative;
  opacity: 0;
  transform: translateY(40px);
  transition: opacity .9s, transform .9s;
}
.layout-full.visible { opacity:1; transform:translateY(0); }
.layout-full img {
  width: 100%;
  height: clamp(320px, 60vh, 700px);
  object-fit: cover;
  display: block;
  filter: saturate(.85) contrast(1.05);
}
.layout-full .overlay-caption {
  position:absolute;
  bottom:0; left:0; right:0;
  padding:60px 8vw 40px;
  background: linear-gradient(to top, rgba(26,16,22,.65), transparent);
  color: #faf5ee;
}

/* Side-by-side */
.layout-duo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  margin-bottom: 3px;
  opacity:0; transform:translateY(40px);
  transition: opacity .9s, transform .9s;
}
.layout-duo.visible { opacity:1; transform:translateY(0); }
.layout-duo img {
  width:100%; aspect-ratio:3/4;
  object-fit:cover; display:block;
  filter: saturate(.85) contrast(1.05);
}
.layout-duo.flipped { grid-template-columns: 1.4fr 1fr; }

/* Offset / magazine */
.layout-offset {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  align-items: center;
  gap: 40px;
  padding: 60px 8vw;
  opacity:0; transform:translateY(40px);
  transition: opacity .9s, transform .9s;
}
.layout-offset.visible { opacity:1; transform:translateY(0); }
.layout-offset.reverse { grid-template-columns: 1.2fr 1fr; }
.layout-offset.reverse .offset-img { order:2; }
.layout-offset.reverse .offset-text { order:1; }
.offset-img {
  position:relative;
}
.offset-img img {
  width:100%;
  aspect-ratio: 4/5;
  object-fit: cover;
  display:block;
  filter: saturate(.85) contrast(1.05);
}
.offset-img::after {
  content:'';
  position:absolute;
  inset:12px -12px -12px 12px;
  border:1.5px solid var(--blush);
  z-index:-1;
  border-radius:2px;
}
.offset-text { padding:20px 0; }

/* Filmstrip */
.layout-strip {
  overflow-x: auto;
  display: flex;
  gap: 3px;
  padding: 0;
  margin-bottom: 3px;
  scrollbar-width: none;
  opacity:0; transform:translateX(-40px);
  transition: opacity .9s, transform .9s;
}
.layout-strip.visible { opacity:1; transform:translateX(0); }
.layout-strip::-webkit-scrollbar { display:none; }
.layout-strip img {
  height: 280px;
  width: auto;
  flex-shrink:0;
  object-fit:cover;
  filter: saturate(.8) contrast(1.08) sepia(.08);
}

/* Spotlight */
.layout-spotlight {
  padding: 80px 8vw;
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 60px;
  align-items: center;
  opacity:0; transform:translateY(40px);
  transition: opacity .9s, transform .9s;
}
.layout-spotlight.visible { opacity:1; transform:translateY(0); }
.layout-spotlight img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:50%;
  filter: saturate(.9) contrast(1.05);
  box-shadow: 0 0 0 12px var(--paper), 0 0 0 14px var(--blush);
}

/* ─── Caption Typography ─── */
.caption-wrap { position:relative; }
.caption-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1.4rem,3vw,2.2rem);
  font-weight: 300;
  color: inherit;
  line-height:1.3;
  margin-bottom: 12px;
}
.caption-label.light { color: #faf5ee; }
.caption-body {
  font-size: .85rem;
  color: var(--mist);
  line-height: 1.8;
  letter-spacing:.5px;
  outline:none;
  min-height:24px;
  border-bottom:1px solid transparent;
  transition:border-color .3s;
}
.caption-body:focus { border-color:var(--blush); }
.caption-body:empty::before {
  content:'写下这个瞬间的故事…';
  color:#ccc; font-style:italic; pointer-events:none;
}
.caption-body.light { color: rgba(250,245,238,.7); }
.caption-body.light:focus { border-color: rgba(250,245,238,.4); }

/* Date stamp */
.date-stamp {
  font-size:.7rem;
  letter-spacing:3px;
  color:var(--gold);
  margin-bottom:14px;
  text-transform:uppercase;
}

/* Delete btn */
.del-btn {
  background:none; border:none;
  cursor:pointer;
  font-size:.78rem;
  color:var(--blush);
  letter-spacing:2px;
  margin-top:16px;
  text-transform:uppercase;
  transition:color .2s;
  display:block;
}
.del-btn:hover { color:var(--rose); }

/* ─── Interlude quote ─── */
.interlude {
  text-align:center;
  padding:100px 10vw;
  opacity:0; transform:translateY(30px);
  transition: opacity .9s, transform .9s;
}
.interlude.visible { opacity:1; transform:translateY(0); }
.interlude blockquote {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(1.6rem,4vw,3rem);
  font-style:italic;
  font-weight:300;
  color:var(--ink);
  line-height:1.4;
  position:relative;
}
.interlude blockquote::before {
  content:'"';
  position:absolute;
  left:-0.3em; top:-0.2em;
  font-size:5em;
  color:var(--blush);
  line-height:1;
  font-style:normal;
}
.interlude cite {
  display:block;
  margin-top:20px;
  color:var(--mist);
  font-size:.8rem;
  letter-spacing:4px;
  font-style:normal;
}

/* ─── END CARD ─── */
#end-card {
  height: 100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg, #1a1016, #2e1820);
  color:#faf5ee;
  text-align:center;
  padding:40px;
  position:relative;
  overflow:hidden;
}
#end-card::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(181,67,79,.18), transparent 70%);
}
.end-big {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(3rem,12vw,9rem);
  font-weight:300;
  font-style:italic;
  line-height:.9;
  position:relative;
  color:#faf5ee;
}
.end-big em { color:var(--rose); }
.end-sub {
  font-family:'Ma Shan Zheng', cursive;
  font-size:clamp(1rem,2.5vw,1.4rem);
  color:rgba(250,245,238,.5);
  margin-top:28px;
  letter-spacing:4px;
  position:relative;
}
.end-distance {
  margin-top:50px;
  font-size:.78rem;
  letter-spacing:5px;
  color:rgba(250,245,238,.3);
  text-transform:uppercase;
  position:relative;
}

/* ─── BGM ─── */
#bgm-wrap {
  position:fixed;
  top:24px; right:24px;
  z-index:500;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:10px;
}
#bgm-orb {
  width:44px; height:44px;
  border-radius:50%;
  border:1.5px solid var(--blush);
  background:rgba(250,245,238,.9);
  backdrop-filter:blur(8px);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem;
  box-shadow:0 2px 16px rgba(26,16,22,.1);
  transition:transform .2s;
}
#bgm-orb:hover { transform:scale(1.1); }
#bgm-orb.playing { animation:spin 8s linear infinite; border-color:var(--rose); }
@keyframes spin { to { transform:rotate(360deg); } }
#bgm-panel {
  background:rgba(250,245,238,.96);
  backdrop-filter:blur(12px);
  border:1px solid var(--blush);
  border-radius:4px;
  padding:18px 20px;
  width:230px;
  display:none;
  box-shadow:0 8px 32px rgba(26,16,22,.1);
}
#bgm-panel.open { display:block; }
#bgm-panel h3 {
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:1rem;
  color:var(--rose);
  margin-bottom:14px;
  font-weight:400;
}
#bgm-upload-lbl {
  display:block;
  border:1px dashed var(--blush);
  padding:10px;
  text-align:center;
  cursor:pointer;
  font-size:.78rem;
  color:var(--mist);
  transition:background .2s;
  border-radius:2px;
  margin-bottom:10px;
}
#bgm-upload-lbl:hover { background:rgba(229,196,200,.2); }
#bgm-title { font-size:.72rem; color:var(--mist); margin-bottom:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#bgm-row { display:flex; align-items:center; gap:10px; }
#bgm-vol { flex:1; -webkit-appearance:none; height:2px; background:var(--blush); outline:none; }
#bgm-vol::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--rose); cursor:pointer; }
#bgm-play {
  background:var(--rose); color:#faf5ee;
  border:none; padding:5px 12px;
  font-size:.75rem; cursor:pointer;
  border-radius:2px; letter-spacing:1px;
}

/* ─── Lightbox ─── */
#lb {
  display:none; position:fixed; inset:0;
  background:rgba(10,5,8,.94);
  z-index:800;
  align-items:center; justify-content:center;
}
#lb.open { display:flex; }
#lb img { max-width:92vw; max-height:90vh; border-radius:2px; animation:lbIn .3s ease; }
@keyframes lbIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
#lb-x { position:absolute; top:20px; right:28px; color:#faf5ee; font-size:2rem; cursor:pointer; background:none; border:none; opacity:.6; line-height:1; }
#lb-x:hover { opacity:1; }

/* ─── Petals ─── */
.petal { position:fixed; top:-40px; pointer-events:none; z-index:998; animation:petfall linear infinite; opacity:.45; font-size:1.2rem; }
@keyframes petfall { to{transform:translateY(110vh) rotate(720deg); opacity:0;} }

/* ─── Monogram ─── */
.monogram {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 22px;
}
.mono-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.1rem, 3vw, 1.6rem);
  font-weight: 300;
  letter-spacing: 6px;
  color: var(--mist);
  text-transform: uppercase;
}
.mono-x {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  font-style: italic;
  color: var(--rose);
  margin: 0 14px;
  opacity: .8;
}
/* Stamp in corner */
.corner-stamp {
  position: absolute;
  top: 28px;
  left: 32px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  z-index: 2;
}
.corner-stamp .cs-initials {
  font-family: 'Cormorant Garamond', serif;
  font-size: .72rem;
  letter-spacing: 5px;
  color: var(--mist);
  text-transform: uppercase;
}
.corner-stamp .cs-heart {
  font-size: .6rem;
  color: var(--rose);
  letter-spacing: 3px;
}

@media(max-width:640px){
  .layout-offset, .layout-spotlight { grid-template-columns:1fr; }
  .layout-offset.reverse .offset-img { order:0; }
  .layout-offset.reverse .offset-text { order:0; }
  .layout-duo { grid-template-columns:1fr; }
  .layout-duo img { aspect-ratio:4/3; }
}
</style>
</head>
<body>

<!-- Petals -->
<div id="petal-container"></div>

<!-- Hero -->
<section id="hero">
  <div id="hero-bg">
    <div class="hero-line"></div>
    <div class="hero-line"></div>
  </div>
  <div class="corner-stamp">
    <span class="cs-initials">LZC · LFR</span>
    <span class="cs-heart">♥ ♥ ♥</span>
  </div>
  <div class="hero-date">5 · 21 · 2026</div>
  <div class="monogram">
    <span class="mono-name">LZC</span>
    <span class="mono-x">×</span>
    <span class="mono-name">LFR</span>
  </div>
  <h1 class="hero-title">我<em>爱</em>你</h1>
  <p class="hero-sub">跨越山海，这些瞬间属于我们</p>
  <div class="scroll-hint">向下翻阅</div>
</section>

<!-- Upload -->
<section id="upload-stage">
  <h2>把你们的故事放进来</h2>
  <p>LZC &amp; LFR · 每一张照片，都是一个章节</p>
  <div id="drop-zone">
    <span class="drop-icon">🌸</span>
    <p><strong>点击或拖拽照片</strong></p>
    <small>支持 JPG · PNG · WEBP · GIF · 无数量限制</small>
  </div>
  <input type="file" id="file-input" multiple accept="image/*">
</section>

<!-- Story scroll -->
<main id="story"></main>

<!-- End card -->
<section id="end-card">
  <div class="end-big">LZC<br><em>×</em><br>LFR</div>
  <p class="end-sub">无论德国还是中国，心都在一起</p>
  <p class="end-distance">BRAUNSCHWEIG ↔ CHINA · 8,500 KM · ∞ LOVE</p>
</section>

<!-- BGM -->
<div id="bgm-wrap">
  <div id="bgm-panel">
    <h3>背景音乐</h3>
    <label id="bgm-upload-lbl" for="bgm-file">上传音乐<br><small>MP3 / WAV / OGG</small></label>
    <input type="file" id="bgm-file" accept="audio/*" style="display:none">
    <div id="bgm-title">未选择</div>
    <div id="bgm-row">
      <span style="font-size:.85rem">🔈</span>
      <input type="range" id="bgm-vol" min="0" max="1" step="0.05" value="0.55">
      <button id="bgm-play">播放</button>
    </div>
  </div>
  <button id="bgm-orb" title="背景音乐">♫</button>
</div>

<!-- Lightbox -->
<div id="lb">
  <button id="lb-x">×</button>
  <img id="lb-img" src="" alt="">
</div>

<audio id="audio" loop></audio>

<script>
// ── Petals
const PC = document.getElementById('petal-container');
['🌸','🌷','🌺','✿','💮'].forEach((s,i) => {
  for(let j=0;j<4;j++){
    const p=document.createElement('div'); p.className='petal'; p.textContent=s;
    p.style.cssText=`left:${Math.random()*100}vw;font-size:${.7+Math.random()*.9}rem;
    animation-duration:${10+Math.random()*14}s;animation-delay:${Math.random()*15}s`;
    PC.appendChild(p);
  }
});

// ── Photos store
let photos = [];
let photoIndex = 0;

// ── Drop zone
const dz = document.getElementById('drop-zone');
const fi = document.getElementById('file-input');
dz.addEventListener('click', ()=>fi.click());
fi.addEventListener('change', e=>loadFiles(e.target.files));
dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag'));
dz.addEventListener('drop', e=>{e.preventDefault();dz.classList.remove('drag');loadFiles(e.dataTransfer.files);});

function loadFiles(files){
  const imgs=[...files].filter(f=>f.type.startsWith('image/'));
  imgs.forEach(f=>{
    const url=URL.createObjectURL(f);
    photos.push({url, id:photoIndex++});
  });
  rebuildStory();
}

// ── Layouts
const layouts=['full','offset','duo','strip','spotlight','offset-reverse','duo-flipped','full'];

function rebuildStory(){
  const story=document.getElementById('story');
  story.innerHTML='';
  if(!photos.length) return;

  // Group into chapters
  let i=0, ch=1;
  while(i<photos.length){
    // Chapter mark every ~4 photos
    if(ch>1){
      const cm=document.createElement('div'); cm.className='chapter-mark';
      cm.innerHTML=`<span class="ch-num">0${ch}</span><div class="ch-line"></div>`;
      story.appendChild(cm); observe(cm);
    } else {
      // First chapter opening
      const il=document.createElement('div'); il.className='interlude';
      il.innerHTML=`<blockquote>距离算什么<br>心跳穿越八千里</blockquote><cite>LZC 写给 LFR · 521</cite>`;
      story.appendChild(il); observe(il);
    }
    ch++;

    // Pick layout
    const layout=layouts[(ch-2)%layouts.length];
    const consumed=buildLayout(story, layout, i);
    i+=consumed;

    // Interlude after every 6
    if(i>0 && i%6===0 && i<photos.length){
      const il=document.createElement('div'); il.className='interlude';
      il.innerHTML=`<blockquote>每一帧，都是永恒</blockquote><cite>LZC × LFR · 我们的故事</cite>`;
      story.appendChild(il); observe(il);
    }
  }
}

function buildLayout(container, layout, startIdx){
  const p=photos;
  let el, used=0;

  switch(layout){
    case 'full':
    case 'full-b': {
      if(startIdx>=p.length) return 0;
      el=document.createElement('div'); el.className='layout-full';
      const ph=p[startIdx];
      el.innerHTML=`
        <img src="${ph.url}" alt="" data-id="${ph.id}">
        <div class="overlay-caption">
          <div class="date-stamp">5 · 21 · 2026</div>
          <div class="caption-label light">这一刻</div>
          <div class="caption-body light" contenteditable="true" spellcheck="false"></div>
          <button class="del-btn" data-id="${ph.id}">— 移除</button>
        </div>`;
      used=1; break;
    }
    case 'offset':
    case 'offset-reverse': {
      if(startIdx>=p.length) return 0;
      el=document.createElement('div');
      el.className=layout==='offset-reverse'?'layout-offset reverse':'layout-offset';
      const ph=p[startIdx];
      el.innerHTML=`
        <div class="offset-img"><img src="${ph.url}" alt="" data-id="${ph.id}"></div>
        <div class="offset-text">
          <div class="date-stamp">5 · 21 · 2026</div>
          <div class="caption-label">一个难忘的瞬间</div>
          <div class="caption-body" contenteditable="true" spellcheck="false"></div>
          <button class="del-btn" data-id="${ph.id}">— 移除</button>
        </div>`;
      used=1; break;
    }
    case 'duo':
    case 'duo-flipped': {
      if(startIdx>=p.length) return buildLayout(container,'offset',startIdx);
      el=document.createElement('div');
      el.className=layout==='duo-flipped'?'layout-duo flipped':'layout-duo';
      const has2=startIdx+1<p.length;
      el.innerHTML=`
        <img src="${p[startIdx].url}" alt="" data-id="${p[startIdx].id}" style="cursor:zoom-in">
        ${has2?`<img src="${p[startIdx+1].url}" alt="" data-id="${p[startIdx+1].id}" style="cursor:zoom-in">`:''}
      `;
      // del overlay on click for duo
      used=has2?2:1; break;
    }
    case 'strip': {
      if(startIdx>=p.length) return 0;
      el=document.createElement('div'); el.className='layout-strip';
      const count=Math.min(5, p.length-startIdx);
      let html='';
      for(let k=0;k<count;k++) html+=`<img src="${p[startIdx+k].url}" alt="" data-id="${p[startIdx+k].id}" style="cursor:zoom-in">`;
      el.innerHTML=html; used=count; break;
    }
    case 'spotlight': {
      if(startIdx>=p.length) return 0;
      el=document.createElement('div'); el.className='layout-spotlight';
      const ph=p[startIdx];
      el.innerHTML=`
        <img src="${ph.url}" alt="" data-id="${ph.id}">
        <div>
          <div class="date-stamp">5 · 21 · 2026</div>
          <div class="caption-label" style="font-size:clamp(1.6rem,4vw,2.8rem)">最美的那一刻</div>
          <div class="caption-body" contenteditable="true" spellcheck="false"></div>
          <button class="del-btn" data-id="${ph.id}">— 移除</button>
        </div>`;
      used=1; break;
    }
    default: return 0;
  }

  if(!el) return 0;
  container.appendChild(el);
  observe(el);

  // Bind events
  el.querySelectorAll('img').forEach(img=>{
    img.addEventListener('click', ()=>openLb(img.src));
    img.style.cursor='zoom-in';
  });
  el.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id=parseInt(btn.dataset.id);
      photos=photos.filter(ph=>ph.id!==id);
      rebuildStory();
    });
  });

  return used;
}

// ── Scroll reveal
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
},{threshold:.12});
function observe(el){ io.observe(el); }

// ── Lightbox
const lb=document.getElementById('lb');
const lbImg=document.getElementById('lb-img');
function openLb(src){ lbImg.src=src; lb.classList.add('open'); }
document.getElementById('lb-x').addEventListener('click',()=>lb.classList.remove('open'));
lb.addEventListener('click',e=>{ if(e.target===lb) lb.classList.remove('open'); });

// ── BGM
const audio=document.getElementById('audio');
const orb=document.getElementById('bgm-orb');
const panel=document.getElementById('bgm-panel');
const bgmFile=document.getElementById('bgm-file');
const bgmTitle=document.getElementById('bgm-title');
const vol=document.getElementById('bgm-vol');
const playBtn=document.getElementById('bgm-play');

orb.addEventListener('click',()=>panel.classList.toggle('open'));
bgmFile.addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  audio.src=URL.createObjectURL(f);
  bgmTitle.textContent=f.name;
  audio.volume=parseFloat(vol.value);
  audio.play(); orb.classList.add('playing'); playBtn.textContent='暂停';
});
playBtn.addEventListener('click',()=>{
  if(!audio.src) return;
  if(audio.paused){audio.play();orb.classList.add('playing');playBtn.textContent='暂停';}
  else{audio.pause();orb.classList.remove('playing');playBtn.textContent='播放';}
});
vol.addEventListener('input',()=>{ audio.volume=parseFloat(vol.value); });
</script>
